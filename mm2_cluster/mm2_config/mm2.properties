# ======================================================
# CORE SETTINGS (WORKER)
# ======================================================
clusters=clusterA,clusterB

clusterA.bootstrap.servers=broker1A:9092,broker2A:9093
clusterB.bootstrap.servers=broker1B:9193,broker2B:9193

#clusterA and clusterB configurations. Default value for the following settings is 3.
#If you want more details about those internal configurations, please see https://docs.confluent.io/home/connect/userguide.html#kconnect-internal-topics
#and https://docs.confluent.io/platform/current/connect/references/allconfigs.html#distributed-worker-configuration
clusterA.config.storage.replication.factor=3
clusterB.config.storage.replication.factor=3
clusterA.offset.storage.replication.factor=3
clusterB.offset.storage.replication.factor=3
clusterA.status.storage.replication.factor=3
clusterB.status.storage.replication.factor=3

# Flow: one-way replication source → target only
clusterA->clusterB.enabled=true
clusterB->clusterA.enabled=false
# Flow: two-way replication source → target and target → source
#clusterA->clusterB.enabled=true
#clusterB->clusterA.enabled=true

# Topics to replicate (regex) and exclude
topics = .*
topics.blacklist=.*[\-\.]internal, .*\.replica, __consumer_offsets
groups=.*
groups.blacklist=console-consumer-.*, connect-.*, __.*
# =============================================================================
# Replication Policy
# IdentityReplicationPolicy → keeps topic names identical on the destination
#   Ideal for migrations and when prefixes like "source.topicName" are unwanted
# DefaultReplicationPolicy (default) → prefixes with "source.topicName"
#   Safer for active-active (prevents loops natively via naming)
# =============================================================================
replication.policy.class = org.apache.kafka.connect.mirror.DefaultReplicationPolicy
#replication.policy.class = org.apache.kafka.connect.mirror.IdentityReplicationPolicy

# Replication factor for replicated topics
replication.factor=3

# MirrorMaker configuration. Default value for the following settings is 3
offset-syncs.topic.replication.factor=3
heartbeats.topic.replication.factor=3
checkpoints.topic.replication.factor=3
# =============================================================================
# Consumer Group Synchronization
# =============================================================================
sync.group.offsets.enabled = true
sync.group.offsets.interval.seconds = 60
emit.checkpoints.enabled = true
emit.checkpoints.interval.seconds = 60

# Sync topic configurations (partitions, retention, etc.) from source to target
sync.topic.configs.enabled = true
# ACLs are generally disabled in local lab environments
sync.topic.acls.enabled = false

# =============================================================================
# MM2 Internal Topics (replication factor = 1 for local lab)
# Use 3 in production
# =============================================================================
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1
offset.storage.replication.factor = 1
status.storage.replication.factor = 1
config.storage.replication.factor = 1

# =============================================================================
# Topic and Consumer Group Discovery
# -----------------------------------------------------------------------------
# MM2 periodically polls to discover new topics and groups.
# Default: 600 seconds (10 minutes) — this is why newly created topics seem
# to not be replicated immediately. Reduce to 30s for lab; 60-120s for production.
# =============================================================================
refresh.topics.enabled = true
refresh.topics.interval.seconds = 30

refresh.groups.enabled = true
refresh.groups.interval.seconds = 30

# =============================================================================
# Performance
# =============================================================================
tasks.max = 3

# Enable heartbeats and checkpoints
clusterA->clusterB.emit.heartbeats.enabled=true
clusterA->clusterB.emit.checkpoints.enabled=true
clusterB->clusterA.emit.heartbeats.enabled=true
clusterB->clusterA.emit.checkpoints.enabled=true